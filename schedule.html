<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>EsakayMo Fare</title>
</head>
<body>
    
      <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!--Style.css-->
    <link rel="stylesheet" href="style.css">


    <div class="container d-flex justify-content-center align-items-center vh-100 ">
    <div class="box-container p-4">

        <!-- Header -->
        <div class="title-box text-center mb-4 bg-secondary">
            <h3><span class="highlight">eSakayMo</span>Fare Matrix</h3>
        </div>

        <div class="row align-items-center bg-primary">

            <!-- Map Section -->
            <div class="col-md-4 text-center bg-primary">
                <div class="map-box p-3">
                    <img src="Screenshot 2026-03-03 163642.png" class="img-fluid rounded" alt="Route Map">
                </div>
            </div>

            <!-- Form Section -->
            <div class="col-md-5 bg-primary">
                <div class="form-section">

                    <label class="form-label fw-bold">PICK-UP LOCATION:</label>
                    <input type="text" class="form-control mb-3" placeholder="North Ave.">

                    <label class="form-label fw-bold">DROP-OFF LOCATION:</label>
                    <input type="text" class="form-control mb-3" placeholder="Taft">

                    <div class="text-center mt-3">
                        <button class="btn btn-dark mt-2" onclick="getRegularFare()">Regular Fare</button>
                      
                    <button type="button" class="btn btn-secondary mt-3" onclick="getDiscount()">Discount Fare</button>
                    <div id="box-discount"></div>
                      <!-- placeholder for regular fare output -->
                      <div id="square-regular"></div>

                    <button type="button" class="btn btn-success mt-3" onclick="window.location.reload()">Reload</button>
                 </div>
            </div>
        </div>
    </div>

    
          
            </div>

        </div>
    </div>
</div>


<script src="main.js"></script>
</body>
</html>
