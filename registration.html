<body>
    <!-- Header -->
<nav class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="javascript:void(0)">Logo</a>

      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mynavbar">
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Fare Matrix</a>

        <li class="nav-item">

      </ul>
      <form class="d-flex">
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Book Now</a>

        <button class="btn btn-primary" type="button">Create Account</button>

<!-- Hero Section -->
<div class="hero-image flex-grow-1">
  <div class="container p-4 mt-5 mb-5 rounded bg-white">
    <h2>Registration Form</h2>
    <hr>
    
    <form>
        <h5>Personal Information</h5>
        <div class="row">
            <!--Full Name-->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                    <input type="text" class="form-control mb-3" placeholder="Enter your full name">
            </div>
            <!--Birth Date-->
            <div class="col-6 col-lg-4">
                <label class="form-label">Birth Date</label>
                    <input type="date" class="form-control mb-3" placeholder="DD/MM/YY">
            </div>
            <!-- Gender -->
            <div class="col-6 col-lg-4">
                <label class="form-label">Sex</label>
                <select class="form-control">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <!--Age-->
            <div class="col-6 col-lg-4">
                <label class="form-label">Age</label>
                    <input type="text" class="form-control mb-3" placeholder="Enter Age Number">
            </div>
        <h5>Contact Information</h5>
            <!--Email-->
            <div class="mb-3">
                <label class="form-label" for="inputEmail">Email</label>
                    <input type="text" class="form-control" id="inputEmail" placeholder="Email">
            </div>
            <!--Contact Number-->
                <div class="mb-3">
                    <label class="form-label" for="inputPassword">Contact number</label>
                        <input type="phone number" class="form-control" id="inputemail" placeholder="Contact Number">
                </div>
            </br>
        <h5>Create Account</h5>
            <!--Create Account-->
            <div class="mb-3">
                <label class="form-label" for="inputEmail">Username</label>
                    <input type="text" class="form-control" id="inputEmail" placeholder="Enter Account Name">
            </div>
            <!--Contact Number-->
                <div class="mb-3">
                    <label class="form-label" for="inputPassword">Password</label>
                        <input type="phone number" class="form-control" id="inputemail" placeholder="Enter Password">
                </div>
              </br><br>
         <!--Checkbox-->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
            </div>

        <!--Button-->
            <button type="submit" class="btn btn-primary">Confirm</button>
     </form>

        <!-- Footer -->
    <footer class="bg-dark text-white text-center fixed-bottom">

    <script src="main.js"></script>
</body>
